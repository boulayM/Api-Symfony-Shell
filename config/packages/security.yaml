security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    login:
      pattern: ^/api/auth/login
      stateless: true
      login_throttling:
        max_attempts: 10
        interval: '1 minute'
      json_login:
        check_path: /api/auth/login
        username_path: email
        password_path: password
        success_handler: lexik_jwt_authentication.handler.authentication_success
        failure_handler: lexik_jwt_authentication.handler.authentication_failure

    refresh:
      pattern: ^/api/auth/refresh
      stateless: true
      refresh_jwt:
        check_path: /api/auth/refresh

    api:
      pattern: ^/api
      stateless: true
      jwt: ~

  access_control:
    - { path: ^/api/docs, roles: PUBLIC_ACCESS }
    - { path: ^/api/health$, roles: PUBLIC_ACCESS }
    - { path: ^/api/csrf$, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/login$, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/register$, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/refresh$, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/verify-email, roles: PUBLIC_ACCESS }
    - { path: ^/api/public/health$, roles: PUBLIC_ACCESS }
    - { path: ^/api/admin, roles: ROLE_USER }
    - { path: ^/api/public, roles: ROLE_USER }
    - { path: ^/api/auth/me$, roles: ROLE_USER }
    - { path: ^/api/auth/logout, roles: ROLE_USER }
    - { path: ^/api/auth/logout-all, roles: ROLE_USER }

when@test:
  security:
    password_hashers:
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4
        time_cost: 3
        memory_cost: 10
