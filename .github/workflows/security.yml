name: Security

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: |
          cat > .env <<'EOF'
          APP_ENV=dev
          APP_DEBUG=1
          APP_SECRET=CI_APP_SECRET
          DEFAULT_URI=http://127.0.0.1:8000
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/symfony_api_shell_test?serverVersion=16&charset=utf8
          JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem
          JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem
          JWT_PASSPHRASE=
          ACCESS_TOKEN_TTL=900
          REFRESH_TOKEN_TTL=86400
          FRONT_URL=http://localhost:8081
          TRUSTED_ORIGINS=^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$
          CSRF_COOKIE_NAME=XSRF-TOKEN
          CORS_ALLOW_ORIGIN='^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
          EOF

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Validate composer files
        run: composer validate --strict --no-check-lock

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Security audit
        run: composer check:security
